name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: frotty/wurstscript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Wurst
        run: grill install wurstscript

      - name: Install Dependencies
        run: grill install

      - name: Test
        run: grill test
